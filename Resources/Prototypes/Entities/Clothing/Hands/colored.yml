- type: entity
  parent: ClothingHandsGlovesSyntheticBase
  id: ClothingHandsGlovesColorPurple
  name: purple gloves
  description: Regular purple gloves that do not keep you from frying.
  components:
  - type: Sprite
    sprite: _Funkystation/Clothing/Hands/Gloves/color.rsi
    layers:
    - state: icon
      color: "#9C0DE1"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#9C0DE1"
      right:
      - state: inhand-right
        color: "#9C0DE1"
  - type: Clothing
    sprite: _Funkystation/Clothing/Hands/Gloves/color.rsi
    clothingVisuals:
      gloves:
      - state: equipped-HAND
        color: "#9C0DE1"
  - type: Fiber
    fiberColor: fibers-purple

